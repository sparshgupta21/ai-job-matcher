# Deploy to HuggingFace Spaces on push to main

name: Deploy to HF Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://sparsh21:$HF_TOKEN@huggingface.co/spaces/sparsh21/AI_job_matcher main